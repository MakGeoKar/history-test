<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивный тест по истории России</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #2a2118;
      --muted: #6f6558;
      --paper: #fffaf0;
      --line: #dcc7a1;
      --accent: #7b3f1d;
      --accent-dark: #4a2512;
      --gold: #b88a3d;
      --green-bg: #edf7ed;
      --green: #236b38;
      --red-bg: #fff0ee;
      --red: #9b2c1f;
      --shadow: 0 24px 70px rgba(42, 33, 24, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(184, 138, 61, 0.24), transparent 32%),
        radial-gradient(circle at bottom right, rgba(90, 60, 33, 0.18), transparent 28%),
        linear-gradient(135deg, #efe2c8 0%, #f8f0df 45%, #ead8b8 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(74, 37, 18, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 37, 18, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .page {
      position: relative;
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28)), var(--paper);
      border: 1px solid rgba(122, 87, 42, 0.28);
      border-radius: 24px;
      padding: 30px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(184, 138, 61, 0.28);
      border-radius: 18px;
      pointer-events: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }

    .stamp {
      min-width: 116px;
      padding: 12px 14px;
      border: 2px solid rgba(123, 63, 29, 0.5);
      border-radius: 16px;
      color: var(--accent-dark);
      text-align: center;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transform: rotate(2deg);
      background: rgba(246, 236, 216, 0.72);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 22px;
      height: 1px;
      background: var(--gold);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    p { line-height: 1.6; }

    .muted {
      color: var(--muted);
      margin-top: 0;
      font-family: Arial, sans-serif;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }

    .field {
      background: rgba(255, 252, 245, 0.72);
      border: 1px solid rgba(220, 199, 161, 0.9);
      border-radius: 18px;
      padding: 14px;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--accent-dark);
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      background: #fffdf7;
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 19px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      font-family: Arial, sans-serif;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(74, 37, 18, 0.16);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
    }

    .primary {
      background: linear-gradient(180deg, #8c4a24, #653115);
      color: white;
      border: 1px solid rgba(74, 37, 18, 0.4);
    }

    .secondary {
      background: #efe0c5;
      color: var(--accent-dark);
      border: 1px solid var(--line);
    }

    .danger {
      background: #f7dfd6;
      color: var(--red);
      border: 1px solid #e5b8ab;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .hidden { display: none !important; }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-weight: 800;
    }

    .progress {
      height: 10px;
      background: #ead9ba;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid rgba(122, 87, 42, 0.18);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      transition: width 0.25s ease;
    }

    .question {
      font-size: clamp(21px, 2.3vw, 28px);
      line-height: 1.35;
      margin: 0 0 22px;
      font-weight: 800;
    }

    .question-topic {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      margin: 0 0 12px;
      padding: 7px 11px;
      border: 1px solid rgba(184, 138, 61, 0.34);
      border-radius: 999px;
      background: rgba(255, 253, 247, 0.72);
      color: var(--accent-dark);
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.25;
    }

    .result-meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      text-align: left;
      background: #fffdf7;
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 700;
      line-height: 1.35;
      border-radius: 16px;
      box-shadow: none;
    }

    .option:hover:not(:disabled) { background: #f6ecd8; }

    .option.correct {
      background: var(--green-bg);
      border-color: rgba(35, 107, 56, 0.55);
      color: var(--green);
    }

    .option.wrong {
      background: var(--red-bg);
      border-color: rgba(155, 44, 31, 0.55);
      color: var(--red);
    }

    .feedback {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.78);
      font-family: Arial, sans-serif;
      line-height: 1.45;
    }

    .feedback.good {
      border-color: rgba(35, 107, 56, 0.55);
      background: var(--green-bg);
    }

    .feedback.bad {
      border-color: rgba(155, 44, 31, 0.55);
      background: var(--red-bg);
    }

    .feedback-title {
      font-weight: 900;
      margin-bottom: 8px;
    }

    .result-score {
      font-size: 42px;
      font-weight: 900;
      margin: 4px 0 8px;
      color: var(--accent-dark);
    }

    .result-list {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .result-item {
      padding: 15px;
      background: rgba(255, 253, 247, 0.8);
      border: 1px solid var(--line);
      border-radius: 16px;
      font-family: Arial, sans-serif;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 9px;
    }

    .badge.ok { background: var(--green-bg); color: var(--green); }
    .badge.no { background: var(--red-bg); color: var(--red); }

    @media (max-width: 720px) {
      .settings { grid-template-columns: 1fr; }
      .card { padding: 22px; }
      .hero { grid-template-columns: 1fr; }
      .stamp { width: fit-content; }
      .topline { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="startScreen" class="card">
      <div class="hero">
        <div>
          <div class="eyebrow">ЕГЭ · история России</div>
          <h1>Интерактивный тест по истории России</h1>
          <p class="muted">Выберите параграф и количество вопросов. Тест идёт вопрос за вопросом: после каждого ответа сразу видно результат и правильный вариант.</p>
        </div>
        <div class="stamp">1945—XXI</div>
      </div>

      <div class="settings">
        <div class="field">
          <label for="paragraphSelect">Параграф</label>
          <select id="paragraphSelect"></select>
        </div>

        <div class="field">
          <label for="countSelect">Количество вопросов</label>
          <select id="countSelect">
            <option value="10">10 вопросов</option>
            <option value="15">15 вопросов</option>
            <option value="20">20 вопросов</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="startBtn">Начать тест</button>
      </div>
    </section>

    <section id="quizScreen" class="card hidden">
      <div class="topline">
        <div id="quizMeta"></div>
        <div id="scoreMeta"></div>
      </div>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="question-topic" id="topicMeta"></div>
      <p class="question" id="questionText"></p>
      <div class="options" id="optionsBox"></div>

      <div id="feedback" class="feedback hidden"></div>

      <div class="actions">
        <button class="secondary hidden" id="nextBtn">Следующий вопрос</button>
        <button class="danger" id="stopBtn">Завершить тест</button>
      </div>
    </section>

    <section id="resultScreen" class="card hidden">
      <h2>Результат</h2>
      <div class="result-score" id="finalScore"></div>
      <p class="muted" id="finalText"></p>

      <div class="actions">
        <button class="primary" id="restartBtn">Пройти ещё раз</button>
      </div>

      <div class="result-list" id="resultList"></div>
    </section>
  </main>

      "§1": "Восстановление и развитие экономики и социальной сферы",
      "§2": "Политическая система в послевоенные годы",
      "§3": "Идеология, наука, культура и спорт в послевоенные годы",
      "§4": "Место и роль СССР в послевоенном мире. Внешняя политика СССР в 1945—1953 гг.",
      "§5": "Новое руководство страны. Смена политического курса",
      "§6": "Экономическое и социальное развитие в 1953—1964 гг.",
      "§7": "Развитие науки и техники в СССР в 1953—1964 гг.",
      "§8": "Культурное пространство в 1953—1964 гг.",
      "§9": "Перемены в повседневной жизни в 1953—1964 гг.",
      "§10": "Внешняя политика в 1953—1964 гг.",
      "§11": "Политическое развитие СССР в 1964—1985 гг.",
      "§12": "Социально-экономическое развитие СССР в 1964—1985 гг.",
      "§13": "Развитие науки, образования, здравоохранения в 1964—1985 гг.",
      "§14": "Идеология и культура в 1964—1985 гг.",
      "§15": "Повседневная жизнь советского общества в 1964—1985 гг.",
      "§16": "Национальная политика и национальные движения в 1964—1985 гг.",
      "§17": "Внешняя политика СССР в 1964—1985 гг.",
      "§18": "СССР и мир в начале 1980-х гг. Предпосылки реформ",
      "§19": "Социально-экономическое развитие СССР в 1985—1991 гг.",
      "§20": "Перемены в духовной сфере в годы перестройки",
      "§21": "Реформа политической системы СССР и её итоги",
      "§22": "Новое политическое мышление и перемены во внешней политике",
      "§23": "Национальная политика и подъём национальных движений. Распад СССР"
};

    function getParagraphLabel(paragraph) {
      return `${paragraph} — ${PARAGRAPH_TITLES[paragraph] || "Без названия"}`;
    }

    const paragraphSelect = document.getElementById("paragraphSelect");
    const countSelect = document.getElementById("countSelect");
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const quizMeta = document.getElementById("quizMeta");
    const scoreMeta = document.getElementById("scoreMeta");
    const progressBar = document.getElementById("progressBar");
    const topicMeta = document.getElementById("topicMeta");
    const questionText = document.getElementById("questionText");
    const optionsBox = document.getElementById("optionsBox");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const stopBtn = document.getElementById("stopBtn");
    const restartBtn = document.getElementById("restartBtn");
    const finalScore = document.getElementById("finalScore");
    const finalText = document.getElementById("finalText");
    const resultList = document.getElementById("resultList");

    const LETTERS = ["А", "Б", "В", "Г", "Д", "Е"];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answersLog = [];
    let answered = false;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function cleanExplanation(value) {
      return String(value || "")
        .replace(/^\s*Правильный ответ:\s*[^.?!]+[.?!]\s*/i, "")
        .replace(/\s*Вопрос составлен по материалу §\d+ учебника\.\s*/i, "")
        .trim();
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function initParagraphs() {
      const paragraphs = [...new Set(QUESTIONS.map(q => q.paragraph))]
        .sort((a, b) => Number(a.replace("§", "")) - Number(b.replace("§", "")));

      paragraphSelect.innerHTML = paragraphs
        .map(p => `<option value="${escapeHtml(p)}">${escapeHtml(getParagraphLabel(p))}</option>`)
        .join("");
    }

    function prepareQuestion(q) {
      const options = q.options.map((text, index) => ({
        text,
        originalIndex: index,
        isCorrect: index === q.correct
      }));

      return {
        ...q,
        shuffledOptions: shuffle(options)
      };
    }

    function startQuiz() {
      const paragraph = paragraphSelect.value;
      const count = Number(countSelect.value);

      const pool = QUESTIONS.filter(q => q.paragraph === paragraph);

      if (pool.length < count) {
        alert(`В выбранном параграфе только ${pool.length} вопросов.`);
        return;
      }

      currentQuestions = shuffle(pool).slice(0, count).map(prepareQuestion);
      currentIndex = 0;
      score = 0;
      answersLog = [];
      answered = false;

      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");

      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      feedback.className = "feedback hidden";
      feedback.innerHTML = "";
      nextBtn.classList.add("hidden");
      optionsBox.innerHTML = "";

      const q = currentQuestions[currentIndex];
      const total = currentQuestions.length;

      quizMeta.textContent = `${getParagraphLabel(q.paragraph)} · вопрос ${currentIndex + 1} из ${total}`;
      scoreMeta.textContent = `Правильно: ${score}`;
      progressBar.style.width = `${(currentIndex / total) * 100}%`;
      topicMeta.textContent = `Тема: ${q.topic || "без темы"}`;
      questionText.textContent = q.question;

      q.shuffledOptions.forEach((option, optionIndex) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = `${LETTERS[optionIndex]}. ${option.text}`;
        btn.addEventListener("click", () => answerQuestion(option));
        optionsBox.appendChild(btn);
      });
    }

    function answerQuestion(selectedOption) {
      if (answered) return;
      answered = true;

      const q = currentQuestions[currentIndex];
      const optionButtons = [...document.querySelectorAll(".option")];
      const correctOption = q.shuffledOptions.find(o => o.isCorrect);
      const isRight = selectedOption.isCorrect;

      optionButtons.forEach((button, index) => {
        button.disabled = true;
        const option = q.shuffledOptions[index];

        if (option.isCorrect) button.classList.add("correct");
        if (option === selectedOption && !option.isCorrect) button.classList.add("wrong");
      });

      if (isRight) score++;

      answersLog.push({
        paragraph: q.paragraph,
        paragraphLabel: getParagraphLabel(q.paragraph),
        topic: q.topic,
        question: q.question,
        selected: selectedOption.text,
        correct: correctOption.text,
        isRight,
        explanation: q.explanation
      });

      const extraExplanation = cleanExplanation(q.explanation);

      feedback.className = `feedback ${isRight ? "good" : "bad"}`;
      feedback.innerHTML = `
        <div class="feedback-title">${isRight ? "Правильно" : "Неправильно"}</div>
        <div><strong>Правильный ответ:</strong> ${escapeHtml(correctOption.text)}</div>
        ${extraExplanation ? `<div style="margin-top: 8px;">${escapeHtml(extraExplanation)}</div>` : ""}
      `;

      scoreMeta.textContent = `Правильно: ${score}`;
      progressBar.style.width = `${((currentIndex + 1) / currentQuestions.length) * 100}%`;

      if (currentIndex < currentQuestions.length - 1) {
        nextBtn.textContent = "Следующий вопрос";
      } else {
        nextBtn.textContent = "Показать результат";
      }

      nextBtn.classList.remove("hidden");
    }

    function nextQuestion() {
      if (!answered) return;

      if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const total = answersLog.length;
      const percent = total === 0 ? 0 : Math.round((score / total) * 100);

      finalScore.textContent = `${score} из ${total}`;
      finalText.textContent = `Итоговый результат: ${percent}%.`;

      resultList.innerHTML = answersLog.map((item, index) => {
        const extraExplanation = cleanExplanation(item.explanation);
        return `
          <div class="result-item">
            <span class="badge ${item.isRight ? "ok" : "no"}">${item.isRight ? "Правильно" : "Ошибка"}</span>
            <div class="result-meta">${escapeHtml(item.paragraphLabel || item.paragraph)} · Тема: ${escapeHtml(item.topic || "без темы")}</div>
            <div><strong>${index + 1}. ${escapeHtml(item.question)}</strong></div>
            <div style="margin-top: 8px;"><strong>Ваш ответ:</strong> ${escapeHtml(item.selected)}</div>
            <div><strong>Правильный ответ:</strong> ${escapeHtml(item.correct)}</div>
            ${extraExplanation ? `<div style="margin-top: 8px; color: #6f6558;">${escapeHtml(extraExplanation)}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    function restart() {
      resultScreen.classList.add("hidden");
      quizScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
    }

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);
    stopBtn.addEventListener("click", showResults);
    restartBtn.addEventListener("click", restart);

    initParagraphs();
  </script>
</body>
</html>
